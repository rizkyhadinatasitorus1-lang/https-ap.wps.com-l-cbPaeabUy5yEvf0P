<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock with Alarm</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .alarm-section {
            margin-top: 30px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: var(--shadow);
        }
        .alarm-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: var(--primary-color);
            font-size: 1.3em;
            font-weight: bold;
        }
        .alarm-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .alarm-input-group input,
        .alarm-input-group button {
            padding: 12px 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1em;
            background: var(--card-bg);
            color: var(--text-color);
            cursor: pointer;
        }
        .alarm-input-group input {
            border: 2px solid var(--border-color);
            flex: 1;
            min-width: 150px;
        }
        .alarm-input-group input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .alarm-input-group button {
            background: var(--primary-color);
            color: white;
            border: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .alarm-input-group button:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }
        .alarm-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .alarm-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            border-radius: 10px;
            animation: slideIn 0.3s ease;
        }
        .alarm-time {
            font-size: 1.5em;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }
        .alarm-label {
            font-size: 0.9em;
            opacity: 0.8;
            margin-top: 5px;
        }
        .alarm-actions {
            display: flex;
            gap: 10px;
        }
        .alarm-toggle,
        .alarm-delete {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .alarm-toggle {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        .alarm-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .alarm-toggle.disabled {
            opacity: 0.5;
        }
        .alarm-delete {
            background: rgba(255, 255, 255, 0.2);
            color: #ff6b6b;
        }
        .alarm-delete:hover {
            background: #ff6b6b;
            color: white;
        }
        .empty-alarms {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
        }
        .alarm-sound {
            display: none;
        }
        .alarm-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--danger-color);
            color: white;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 10000;
            animation: slideInRight 0.3s ease;
            max-width: 400px;
        }
        @keyframes slideInRight {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .alarm-notification h2 {
            margin-bottom: 10px;
            font-size: 1.3em;
        }
        .alarm-notification p {
            font-size: 0.9em;
            opacity: 0.9;
        }
        .alarm-notification-close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1><i class="fas fa-alarm-clock"></i> Clock with Alarm</h1>
                <p>Manage your alarms and timezones</p>
            </div>
            <div class="header-controls">
                <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">
                    <i class="fas fa-moon"></i>
                </button>
                <a href="index.html" style="color: white; margin-left: 10px; text-decoration: none;">
                    <button style="background: rgba(255, 255, 255, 0.2); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer;">
                        <i class="fas fa-arrow-left"></i> Back to Clock
                    </button>
                </a>
            </div>
        </header>

        <!-- Clock Section -->
        <div id="clockDisplay" style="text-align: center; font-size: 3em; font-weight: bold; margin: 20px 0; font-family: 'Courier New', monospace; color: var(--primary-color);">00:00:00</div>

        <!-- Alarm Section -->
        <section class="alarm-section">
            <div class="alarm-header">
                <div><i class="fas fa-bell"></i> Alarms</div>
            </div>

            <div class="alarm-input-group">
                <input type="time" id="alarmTime" placeholder="Set alarm time">
                <input type="text" id="alarmLabel" placeholder="Alarm label (optional)" style="flex: 2;">
                <button id="addAlarmBtn"><i class="fas fa-plus"></i> Add Alarm</button>
            </div>

            <div class="alarm-list" id="alarmList">
                <div class="empty-alarms">
                    <i class="fas fa-inbox" style="font-size: 3em; margin-bottom: 10px; display: block;"></i>
                    <p>No alarms set. Add one to get started!</p>
                </div>
            </div>
        </section>
    </div>

    <!-- Hidden audio element for alarm sound -->
    <audio id="alarmSound" class="alarm-sound">
        <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
    </audio>

    <script src="alarm.js"></script>
</body>
</html>
